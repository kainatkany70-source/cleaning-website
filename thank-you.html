<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Magic Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="font-sans text-slate-800 bg-slate-50 antialiased min-h-screen flex items-center justify-center p-4">

    <div
        class="max-w-md w-full bg-white rounded-3xl p-8 text-center shadow-xl border border-slate-100 space-y-6 transform transition scale-100">

        <div
            class="w-16 h-16 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto text-2xl shadow-inner">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <div class="space-y-2">
            <h1 class="text-3xl font-black tracking-tight text-slate-950">Thank You!</h1>
            <p class="text-sm font-semibold text-amber-600 uppercase tracking-wider">Message Sent Successfully</p>
            <p class="text-slate-500 text-sm leading-relaxed pt-2">
                We have received your request. Our team will review your details and get back to you as soon as
                possible.
            </p>
        </div>

        <hr class="border-slate-100">

        <div>
            <a href="index.html"
                class="inline-flex items-center gap-2 bg-slate-950 text-white font-semibold px-6 py-3 rounded-xl hover:bg-slate-800 transition shadow-sm text-sm w-full justify-center">
                <i class="fa-solid fa-arrow-left text-xs"></i> Back to Homepage
            </a>
        </div>

    </div>

</body>

</html>
